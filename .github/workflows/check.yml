name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build container
        run: |
          docker build --no-cache -f Containerfile --target check -t asn1-check .

      - name: Run tests in container
        run: |
          docker run --cap-add=NET_RAW --name asn1-run asn1-check

      - name: Extract artifacts
        if: always()
        run: |
          docker cp asn1-run:/src/build/tls_connect_tool tls_connect_tool
          docker cp asn1-run:/src/build/captures captures || mkdir -p captures
          docker rm asn1-run
          chmod +x tls_connect_tool

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: asn1-check
          artifact-name: sbom-tls_connect_tool.spdx.json
          output-file: sbom-tls_connect_tool.spdx.json

      - name: Attest binary
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: tls_connect_tool

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tls_connect_tool-linux-amd64
          path: tls_connect_tool

      - name: Upload packet captures
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packet-captures
          path: captures/
